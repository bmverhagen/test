<!doctype html>
<html>
<head><title>Amazon.com</title></head>
<body>
<div class="a-container a-padding-double-large">
  <form method="get" action="/errors/validateCaptcha" name="">
    <div class="a-box a-alert a-alert-info a-spacing-base">
      <h4>Enter the characters you see below</h4>
      <p class="a-last">Sorry, we just need to make sure you're not a robot. For best results, please make sure your browser is accepting cookies.</p>
    </div>
    <div class="a-section">
      <img src="https://images-na.ssl-images-amazon.com/captcha/example/Captcha_example.jpg">
      <input type="text" id="captchacharacters" name="field-keywords" class="a-span12" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button type="submit" class="a-button-text">Continue shopping</button>
    </div>
  </form>
  <p>To discuss automated access to Amazon data please contact api-services-support@amazon.com.</p>
</div>
</body>
</html>
